<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#071426;color:#fff;font-family:Arial,'Malgun Gothic',sans-serif;overflow:hidden}
.wrap{height:132px;padding:10px;background:linear-gradient(135deg,rgba(47,155,255,.16),rgba(0,0,0,.26));border:1px solid rgba(126,200,255,.35);border-radius:11px}
.row{display:flex;gap:7px}
.inp{flex:1;height:42px;border-radius:9px;border:1px solid rgba(126,200,255,.42);background:#020617;color:#fff;padding:0 11px;font-size:14px;font-weight:900;outline:none}
.btn{width:86px;height:42px;border:0;border-radius:9px;background:linear-gradient(135deg,#2f9bff,#635bff);color:#fff;font-size:14px;font-weight:1000;cursor:pointer}
.hint{margin-top:9px;color:#cbd5e1;font-size:11px;font-weight:800;line-height:1.45;text-align:center}
.hint b{color:#7ec8ff}
.err{margin-top:6px;color:#ff8a8a;font-size:11px;font-weight:900;text-align:center;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <input id="q" class="inp" placeholder="닉네임 입력 예) 족버지" autocomplete="off">
    <button id="go" class="btn" type="button">검색</button>
  </div>
  <div id="err" class="err">닉네임을 입력하세요.</div>
  <div class="hint"><b>SOOP(숲) · 인터넷방송 · 스타방송 · 스타대학</b><br>검색 버튼을 누르면 새 탭에 4개 결과와 제목 감지바를 띄웁니다.</div>
</div>

<script>
(function(){
  var BASE='https://keyman1335-maker.github.io/poong-rank';
  var GUARD_JS=BASE+'/c9_search_result_guard.js?v=202606130900';
  var BAD_WORDS_URL=BASE+'/bad_words.json?v=202606130900';
  var boards=[
    {name:'SOOP(숲)',url:'https://ygosu.com/board/soop'},
    {name:'인터넷방송',url:'https://ygosu.com/board/ib'},
    {name:'스타방송',url:'https://ygosu.com/board/starbbs'},
    {name:'스타대학',url:'https://ygosu.com/board/pan_monstarz'}
  ];

  function esc(s){
    return String(s||'').replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c;
    });
  }

  function resultHtml(q){
    var enc=encodeURIComponent(q);
    var frames=boards.map(function(b){
      var src=b.url+'?best_article=N&searcht=w&search='+enc;
      return '<div style="flex:1;min-width:360px;height:100%;display:flex;flex-direction:column;border-right:1px solid #334155;background:#111827;">'
        + '<div style="height:42px;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#fff;font-weight:900;font-size:14px;border-bottom:1px solid #334155;">'+esc(b.name)+' 검색 : '+esc(q)+'</div>'
        + '<iframe class="yg-frame" data-board="'+esc(b.name)+'" src="'+src+'" style="flex:1;width:100%;border:0;background:#fff;"></iframe>'
        + '</div>';
    }).join('');

    return '<!doctype html><html><head><meta charset="utf-8"><title>와이고수 닉네임 검색 - '+esc(q)+'</title></head>'
      + '<body style="margin:0;width:100vw;height:100vh;overflow:hidden;background:#111827;font-family:Arial,Malgun Gothic,sans-serif;">'
      + '<div id="guard-pop" style="display:block;position:fixed;z-index:999999;left:50%;top:14px;transform:translateX(-50%);width:min(920px,calc(100vw - 24px));max-height:58vh;overflow:auto;border:1px solid #3b82f6;border-radius:16px;background:linear-gradient(135deg,#0f172a,#111827);box-shadow:0 18px 60px rgba(0,0,0,.55);color:#fff;">'
      + '<div style="padding:10px 42px 10px 13px;background:rgba(15,23,42,.94);border-bottom:1px solid rgba(59,130,246,.45);">'
      + '<button id="guard-close-ready" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>'
      + '<div style="font-size:16px;font-weight:1000;color:#fff;">🚨 게시글 제목 감지</div>'
      + '<div id="guard-status" style="margin-top:4px;color:#93c5fd;font-size:13px;font-weight:900;">제목 감지 준비중... · iframe 로딩 대기</div>'
      + '</div></div>'
      + '<div style="display:flex;width:100%;height:100%;overflow:auto;">'+frames+'</div>'
      + '<script>window.C9_GUARD_CONFIG={keywordUrl:'+JSON.stringify(BAD_WORDS_URL)+',query:'+JSON.stringify(q)+'};<'+'/script>'
      + '<script src="'+GUARD_JS+'"><'+'/script>'
      + '</body></html>';
  }

  function search(e){
    if(e){e.preventDefault();e.stopPropagation();}
    var q=document.getElementById('q').value.trim();
    var err=document.getElementById('err');
    if(!q){err.style.display='block';return false;}
    err.style.display='none';
    var w=window.open('about:blank','_blank');
    if(!w){alert('팝업이 차단되었습니다. 팝업 허용 후 다시 검색하세요.');return false;}
    w.document.open();
    w.document.write(resultHtml(q));
    w.document.close();
    return false;
  }

  document.getElementById('go').addEventListener('click', search, false);
  document.getElementById('q').addEventListener('keydown', function(e){ if(e.key==='Enter') search(e); }, false);
})();
</script>
</body>
</html>
