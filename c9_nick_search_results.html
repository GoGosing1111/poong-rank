<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>와이고수 닉네임 검색</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;background:#111827;font-family:Arial,'Malgun Gothic',sans-serif;color:#fff}
body{overflow:auto}
#wrap{padding:86px 12px 14px}
#result-grid{display:grid;grid-template-columns:repeat(4,minmax(300px,1fr));gap:10px}
@media(max-width:1300px){#result-grid{grid-template-columns:repeat(2,minmax(300px,1fr))}}
@media(max-width:760px){#result-grid{grid-template-columns:1fr}}
.col{min-height:220px;border:1px solid #334155;border-radius:14px;background:#111827;overflow:hidden}
.head{height:42px;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#fff;font-weight:900;font-size:14px;border-bottom:1px solid #334155}
.list{padding:10px}
.item{display:block;margin-bottom:8px;padding:9px;border-radius:10px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10);text-decoration:none;color:#fff}
.item:hover{border-color:#60a5fa;background:rgba(59,130,246,.16)}
.item-title{font-size:13px;font-weight:900;line-height:1.35;word-break:break-word}
.item-hit{margin-top:5px;color:#ffb4b4;font-size:12px;font-weight:900}
.item-meta{margin-top:4px;color:#94a3b8;font-size:11px;font-weight:800}
.empty{padding:20px 10px;text-align:center;color:#94a3b8;font-size:13px;font-weight:900}
#guard-pop{display:block;position:fixed;z-index:999999;left:50%;top:14px;transform:translateX(-50%);width:min(920px,calc(100vw - 24px));max-height:64vh;overflow:auto;border:1px solid #3b82f6;border-radius:16px;background:linear-gradient(135deg,#0f172a,#111827);box-shadow:0 18px 60px rgba(0,0,0,.55);color:#fff}
</style>
</head>
<body>
<div id="guard-pop">
  <div style="padding:10px 42px 10px 13px;background:rgba(15,23,42,.94);border-bottom:1px solid rgba(59,130,246,.45);">
    <button id="guard-close-ready" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>
    <div style="font-size:16px;font-weight:1000;color:#fff;">🚨 게시글 제목 감지</div>
    <div id="guard-status" style="margin-top:4px;color:#93c5fd;font-size:13px;font-weight:900;">Worker 기반 검색 준비중...</div>
  </div>
</div>

<div id="wrap"><div id="result-grid"></div></div>

<script>
(function(){
  'use strict';

  var params = new URLSearchParams(location.search);
  var nick = params.get('nick') || '';
  var WORKER = 'https://ygosu-proxy.keyman1335.workers.dev/?url=';
  var KEYWORD_URL = 'https://keyman1335-maker.github.io/poong-rank/bad_words.json?v=' + Date.now();

  var boards = [
    {name:'SOOP(숲)', url:'https://ygosu.com/board/soop'},
    {name:'인터넷방송', url:'https://ygosu.com/board/ib'},
    {name:'스타방송', url:'https://ygosu.com/board/starbbs'},
    {name:'스타대학', url:'https://ygosu.com/board/pan_monstarz'}
  ];

  function $(id){return document.getElementById(id);}
  function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c;});}
  function status(msg,color){var el=$('guard-status'); if(el){el.textContent=msg; if(color)el.style.color=color;}}
  function closePanel(){var p=$('guard-pop'); if(p)p.style.display='none';}
  $('guard-close-ready').onclick = closePanel;

  function normalize(s){
    return String(s||'').toLowerCase().replace(/[|｜┃│∣❘❙❚]/g,'ㅣ').replace(/\s+/g,'');
  }

  function fallbackDict(){
    return {
      categories:{
        "팬덤비하자":[
          {"word":"길견","score":3},{"word":"길나인","score":3},{"word":"ㅣㅣ","score":3},{"word":"길태","score":3},{"word":"젖퀴","score":3}
        ],
        "타퀴의심":[
          {"word":"덕구","score":2},{"word":"강덕구","score":2},{"word":"케이","score":2},{"word":"보성","score":2}
        ],
        "이간질":[
          {"word":"방갤","score":2},{"word":"벽갤","score":2},{"word":"씨나갤","score":2}
        ]
      },
      levels:[
        {"min":6,"label":"위험","emoji":"🚨"},
        {"min":3,"label":"주의","emoji":"⚠️"},
        {"min":1,"label":"감지","emoji":"🟡"},
        {"min":0,"label":"정상","emoji":"✅"}
      ]
    };
  }

  function flatten(dict){
    var root = dict && dict.categories ? dict.categories : dict;
    var out = [];
    if(!root || typeof root !== 'object') return out;
    Object.keys(root).forEach(function(cat){
      var arr = root[cat];
      if(!Array.isArray(arr)) return;
      arr.forEach(function(x){
        if(typeof x === 'string') out.push({category:cat, word:x, score:1});
        else if(x && x.word) out.push({category:cat, word:String(x.word), score:Number(x.score||1)});
      });
    });
    var seen = {};
    out = out.filter(function(k){
      var key = k.category + '|' + k.word;
      if(seen[key]) return false;
      seen[key] = 1;
      return true;
    });
    out.sort(function(a,b){return String(b.word).length - String(a.word).length;});
    return out;
  }

  function levels(dict){
    var lv = dict && Array.isArray(dict.levels) ? dict.levels : fallbackDict().levels;
    return lv.slice().sort(function(a,b){return Number(b.min||0)-Number(a.min||0);});
  }

  function pickLevel(score, lv){
    for(var i=0;i<lv.length;i++){
      if(score >= Number(lv[i].min||0)) return lv[i];
    }
    return {min:0,label:'정상',emoji:'✅'};
  }

  function loadDict(){
    return fetch(KEYWORD_URL,{cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .catch(function(){ return fallbackDict(); });
  }

  function cleanTitle(raw){
    return String(raw||'')
      .replace(/\s*:\s*SOOP\(숲\)\s*-\s*와이고수\s*$/i,'')
      .replace(/\s*-\s*와이고수\s*$/i,'')
      .replace(/\s*\|\s*YGOSU.*$/i,'')
      .replace(/\s+/g,' ')
      .trim();
  }

  function scanTitle(title, keywords){
    var low = normalize(title);
    var hits = [];
    keywords.forEach(function(k){
      var w = normalize(k.word);
      if(!w) return;
      var pos=0,count=0;
      while((pos = low.indexOf(w,pos)) !== -1){
        count++;
        pos += w.length;
      }
      if(count) hits.push({category:k.category, word:k.word, score:Number(k.score||1), count:count, sum:Number(k.score||1)*count});
    });
    return hits;
  }

  function proxied(url){ return WORKER + encodeURIComponent(url); }

  function fetchHtml(url){
    return fetch(proxied(url), {cache:'no-store'}).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    });
  }

  function absoluteUrl(href){
    try { return new URL(href, 'https://ygosu.com').href; }
    catch(e){ return ''; }
  }

  function collectTitlesFromSearch(html, boardName){
    var doc = new DOMParser().parseFromString(html, 'text/html');
    var titles = [];
    var selectors = ['td.subject a','.subject a','.list_subject a','a[href*="/board/"]'].join(',');
    doc.querySelectorAll(selectors).forEach(function(a){
      var t = (a.textContent || '').replace(/\s+/g,' ').trim();
      var href = absoluteUrl(a.getAttribute('href') || a.href || '');
      if(t.length < 2 || t.length > 160) return;
      if(/^(전체|인기|와토|공지|정보|사진|영상|이벤트|관리자|추천|댓글|목록|군대\/밀리터리\/예비군|패션\/뷰티|힙합|동물\/곤충|그림|여행|캠핑|독서\/서적|게임\/방송|스타방송|스타대학|SOOP\(숲\))$/.test(t)) return;
      // 게시판 메뉴/카테고리 링크 제거: 실제 글 URL만 통과시킴. 예) /board/soop/1685076
      var path = '';
      try { path = new URL(href).pathname; } catch(e) { path = href; }
      if(!/^\/board\/[^\/]+\/\d+/.test(path)) return;
      titles.push({board:boardName, title:cleanTitle(t), href:href});
    });
    var seen = {};
    return titles.filter(function(x){
      var k = x.title + '|' + x.href;
      if(seen[k]) return false;
      seen[k] = 1;
      return true;
    }).slice(0, 50);
  }

  function renderColumns(grouped){
    var grid = $('result-grid');
    grid.innerHTML = boards.map(function(b){
      var arr = grouped[b.name] || [];
      var body = arr.length ? arr.map(function(r){
        var hitText = r.hits.length ? r.hits.map(function(h){return h.word+(h.count>1?'×'+h.count:'')+' +'+h.sum;}).join(', ') : '감지 없음';
        var cls = r.hits.length ? 'item-hit' : 'item-meta';
        return '<a class="item" target="_blank" href="'+esc(r.href)+'">'
          + '<div class="item-title">'+esc(r.title)+'</div>'
          + '<div class="'+cls+'">감지: '+esc(hitText)+'</div>'
          + '</a>';
      }).join('') : '<div class="empty">검색 결과 없음</div>';
      return '<div class="col"><div class="head">'+esc(b.name)+' 검색 : '+esc(nick)+'</div><div class="list">'+body+'</div></div>';
    }).join('');
  }

  function renderPopup(rows, lv){
    var total = 0;
    rows.forEach(function(r){r.hits.forEach(function(h){total += Number(h.sum||h.score||1);});});
    var p = $('guard-pop');
    if(!p) return;
    var level = pickLevel(total, lv);

    if(!rows.length){
      p.style.border = '1px solid #3b82f6';
      p.innerHTML = '<div style="padding:10px 42px 10px 13px;background:rgba(15,23,42,.94);border-bottom:1px solid rgba(59,130,246,.45);">'
        + '<button id="guard-close" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>'
        + '<div style="font-size:16px;font-weight:1000;color:#fff;">✅ 게시글 제목 감지</div>'
        + '<div style="margin-top:4px;color:#93c5fd;font-size:13px;font-weight:900;">감지 없음 · 점수 0점 · 감지글 0건</div>'
        + '</div>';
      $('guard-close').onclick = closePanel;
      return;
    }

    var byCat = {};
    rows.forEach(function(r){
      r.hits.forEach(function(h){
        var c = h.category || '감지';
        if(!byCat[c]) byCat[c] = [];
        byCat[c].push(h.word);
      });
    });

    var catHtml = Object.keys(byCat).map(function(cat){
      var uniq = byCat[cat].filter(function(v,i,a){return a.indexOf(v)===i;});
      return '<span style="display:inline-block;margin:3px;padding:5px 8px;border-radius:999px;background:#7f1d1d;border:1px solid #ef4444;color:#fff;font-size:12px;font-weight:900;">'
        + esc(cat) + ' : ' + esc(uniq.join(', ')) + '</span>';
    }).join('');

    var list = rows.slice(0, 15).map(function(r){
      var hitText = r.hits.map(function(h){return h.word+(h.count>1?'×'+h.count:'')+' +'+h.sum;}).join(', ');
      return '<div style="margin-top:8px;padding:9px;border-radius:10px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.10);">'
        + '<div style="color:#7ec8ff;font-size:12px;font-weight:1000;">'+esc(r.board)+'</div>'
        + '<div style="margin-top:3px;color:#fff;font-size:13px;font-weight:900;line-height:1.35;">'+esc(r.title)+'</div>'
        + '<div style="margin-top:5px;color:#ffb4b4;font-size:12px;font-weight:900;">감지: '+esc(hitText)+'</div>'
        + '</div>';
    }).join('');

    p.style.border = '1px solid #ef4444';
    p.innerHTML = '<div style="position:sticky;top:0;padding:12px 42px 10px 13px;background:rgba(15,23,42,.94);border-bottom:1px solid rgba(239,68,68,.45);">'
      + '<button id="guard-close" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>'
      + '<div style="font-size:17px;font-weight:1000;color:#fff;">'+esc(level.emoji||'🚨')+' 게시글 제목 감지</div>'
      + '<div style="margin-top:4px;color:#ffb4b4;font-size:13px;font-weight:900;">'+esc(level.label||'감지')+' · 점수 '+total+'점 · 감지글 '+rows.length+'건</div>'
      + '<div style="margin-top:7px;">'+catHtml+'</div>'
      + '</div><div style="padding:10px 12px 13px;">'+list+'</div>';
    $('guard-close').onclick = closePanel;
  }

  async function main(){
    document.title = '와이고수 닉네임 검색 - ' + nick;
    renderColumns({});
    if(!nick){
      status('닉네임 없음', '#fca5a5');
      return;
    }

    var dict = await loadDict();
    var keywords = flatten(dict);
    var lv = levels(dict);
    status('키워드 '+keywords.length+'개 로드 · Worker로 검색결과 수집중...', '#93c5fd');

    var grouped = {};
    var all = [];

    for(var i=0;i<boards.length;i++){
      var b = boards[i];
      grouped[b.name] = [];
      try{
        status((i+1)+'/'+boards.length+' '+b.name+' 검색결과 수집중...', '#93c5fd');
        var searchUrl = b.url + '?best_article=N&searcht=w&search=' + encodeURIComponent(nick);
        var html = await fetchHtml(searchUrl);
        var rows = collectTitlesFromSearch(html, b.name).map(function(r){
          r.hits = scanTitle(r.title, keywords);
          return r;
        });
        grouped[b.name] = rows;
        rows.forEach(function(r){ if(r.hits.length) all.push(r); });
        renderColumns(grouped);
      }catch(e){
        grouped[b.name] = [{board:b.name,title:'검색 실패: '+e.message,href:b.url,hits:[]}];
        renderColumns(grouped);
      }
    }

    renderPopup(all, lv);
  }

  main();
})();
</script>
</body>
</html>
