<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>와이고수 닉네임 검색</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111827;font-family:Arial,'Malgun Gothic',sans-serif}
#frames{display:flex;width:100%;height:100%;overflow:auto}
.col{flex:1;min-width:360px;height:100%;display:flex;flex-direction:column;border-right:1px solid #334155;background:#111827}
.head{height:42px;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#fff;font-weight:900;font-size:14px;border-bottom:1px solid #334155}
iframe{flex:1;width:100%;border:0;background:#fff}
#guard-pop{display:block;position:fixed;z-index:999999;left:50%;top:14px;transform:translateX(-50%);width:min(920px,calc(100vw - 24px));max-height:260px;overflow:auto;border:1px solid #f59e0b;border-radius:16px;background:linear-gradient(135deg,#0f172a,#111827);box-shadow:0 18px 60px rgba(0,0,0,.55);color:#fff}
</style>
</head>
<body>
<div id="guard-pop">
  <div style="padding:10px 42px 10px 13px;background:rgba(15,23,42,.94);border-bottom:1px solid rgba(245,158,11,.45);">
    <button id="guard-close-ready" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>
    <div style="font-size:16px;font-weight:1000;color:#fff;">🔎 닉네임 검색 결과</div>
    <div id="guard-status" style="margin-top:4px;color:#fbbf24;font-size:13px;font-weight:900;">검색 결과 출력중 · Worker로 제목 자동 점수 분석중...</div>
  </div>
</div>
<div id="frames"></div>

<script>
(function(){
  'use strict';

  var params=new URLSearchParams(location.search);
  var nick=params.get('nick')||'';
  var WORKER='https://ygosu-proxy.keyman1335.workers.dev/?url=';
  var KEYWORD_URL='https://keyman1335-maker.github.io/poong-rank/bad_words.json?v='+Date.now();

  var boards=[
    {name:'SOOP(숲)',url:'https://ygosu.com/board/soop'},
    {name:'인터넷방송',url:'https://ygosu.com/board/ib'},
    {name:'스타방송',url:'https://ygosu.com/board/starbbs'},
    {name:'스타대학',url:'https://ygosu.com/board/pan_monstarz'}
  ];

  function $(id){return document.getElementById(id);}
  function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c;});}
  function status(msg,color){var el=$('guard-status');if(el){el.textContent=msg;if(color)el.style.color=color;}}
  function closePanel(){var p=$('guard-pop');if(p)p.style.display='none';}
  $('guard-close-ready').onclick=closePanel;

  function normalize(s){
    return String(s||'').toLowerCase().replace(/[|｜┃│∣❘❙❚]/g,'ㅣ').replace(/\s+/g,'');
  }

  function fallbackDict(){
    return {categories:{
      "팬덤비하자":[{"word":"길견","score":3},{"word":"길나인","score":3},{"word":"ㅣㅣ","score":3},{"word":"길태","score":3},{"word":"젖퀴","score":3}],
      "타퀴의심":[{"word":"덕구","score":2},{"word":"강덕구","score":2},{"word":"케이","score":2},{"word":"보성","score":2}],
      "이간질":[{"word":"방갤","score":2},{"word":"벽갤","score":2},{"word":"씨나갤","score":2}]
    },levels:[
      {"min":6,"label":"위험","emoji":"🚨"},
      {"min":3,"label":"주의","emoji":"⚠️"},
      {"min":1,"label":"감지","emoji":"🟡"},
      {"min":0,"label":"정상","emoji":"✅"}
    ]};
  }

  function flatten(dict){
    var root=dict&&dict.categories?dict.categories:dict;
    var out=[];
    if(!root||typeof root!=='object')return out;
    Object.keys(root).forEach(function(cat){
      var arr=root[cat];
      if(!Array.isArray(arr))return;
      arr.forEach(function(x){
        if(typeof x==='string')out.push({category:cat,word:x,score:1});
        else if(x&&x.word)out.push({category:cat,word:String(x.word),score:Number(x.score||1)});
      });
    });
    var seen={};
    out=out.filter(function(k){
      var key=k.category+'|'+k.word;
      if(seen[key])return false;
      seen[key]=1;
      return true;
    });
    out.sort(function(a,b){return String(b.word).length-String(a.word).length;});
    return out;
  }

  function levels(dict){
    var lv=dict&&Array.isArray(dict.levels)?dict.levels:fallbackDict().levels;
    return lv.slice().sort(function(a,b){return Number(b.min||0)-Number(a.min||0);});
  }

  function pickLevel(score,lv){
    for(var i=0;i<lv.length;i++){
      if(score>=Number(lv[i].min||0))return lv[i];
    }
    return {min:0,label:'정상',emoji:'✅'};
  }

  function loadDict(){
    return fetch(KEYWORD_URL,{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .catch(function(){return fallbackDict();});
  }

  function cleanTitle(raw){
    return String(raw||'')
      .replace(/\s*:\s*SOOP\(숲\)\s*-\s*와이고수\s*$/i,'')
      .replace(/\s*-\s*와이고수\s*$/i,'')
      .replace(/\s*\|\s*YGOSU.*$/i,'')
      .replace(/\s+/g,' ')
      .trim();
  }

  function scanTitle(title,keywords){
    var low=normalize(title);
    var hits=[];
    keywords.forEach(function(k){
      var w=normalize(k.word);
      if(!w)return;
      var pos=0,count=0;
      while((pos=low.indexOf(w,pos))!==-1){
        count++;
        pos+=w.length;
      }
      if(count)hits.push({category:k.category,word:k.word,score:Number(k.score||1),count:count,sum:Number(k.score||1)*count});
    });
    return hits;
  }

  function proxied(url){return WORKER+encodeURIComponent(url);}
  function fetchHtml(url){
    return fetch(proxied(url),{cache:'no-store'}).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.text();
    });
  }

  function absoluteUrl(href){
    try{return new URL(href,'https://ygosu.com').href;}
    catch(e){return '';}
  }

  function collectArticleLinksFromSearch(html,boardName){
    var doc=new DOMParser().parseFromString(html,'text/html');
    var links=[];
    var nickNorm=normalize(nick);

    var selectors=[
      'td.subject a[href*="/board/"]',
      '.subject a[href*="/board/"]',
      '.list_subject a[href*="/board/"]',
      'a[href*="/board/"]'
    ].join(',');

    doc.querySelectorAll(selectors).forEach(function(a){
      var href=absoluteUrl(a.getAttribute('href')||a.href||'');
      var path='';
      try{path=new URL(href).pathname;}catch(e){path=href;}
      if(!/^\/board\/[^\/]+\/\d+/.test(path))return;

      var t=(a.textContent||'').replace(/\s+/g,' ').trim();
      if(t.length<2 || t.length>180)return;
      if(/^(전체|인기|와토|공지|정보|사진|영상|이벤트|관리자|추천|댓글|목록|실시간|일간|미네랄|일반|엽기자랑|자유게시판|정치\/이슈|연애\/상담)$/.test(t))return;

      // 핵심: 검색한 닉네임이 작성자/행 영역에 있는 글만 분석한다.
      // 사이드 인기글/다른 작성자 글이 같은 페이지에 섞여도 제외.
      var box=a.closest('tr,li,.list-item,.article,.board_item,.board-list-item,.post,.item,tbody');
      var rowText=(box ? box.textContent : a.parentElement ? a.parentElement.textContent : a.textContent || '').replace(/\s+/g,' ').trim();
      if(nickNorm && normalize(rowText).indexOf(nickNorm)===-1)return;

      links.push({board:boardName,title:cleanTitle(t),href:href,rowText:rowText});
    });

    var seen={};
    return links.filter(function(x){
      var k=x.href;
      if(seen[k])return false;
      seen[k]=1;
      return true;
    }).slice(0,40);
  }

  function renderPopup(rows,lv){
    var total=0;
    rows.forEach(function(r){r.hits.forEach(function(h){total+=Number(h.sum||h.score||1);});});
    var p=$('guard-pop');
    if(!p)return;
    var level=pickLevel(total,lv);

    if(!rows.length){
      p.style.border='1px solid #3b82f6';
      p.style.maxHeight='120px';
      p.innerHTML='<div style="padding:10px 42px 10px 13px;background:rgba(15,23,42,.94);">'
        +'<button id="guard-close" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>'
        +'<div style="font-size:16px;font-weight:1000;color:#fff;">✅ 게시글 제목 감지</div>'
        +'<div style="margin-top:4px;color:#93c5fd;font-size:13px;font-weight:900;">감지 없음 · 점수 0점 · 감지글 0건</div>'
        +'</div>';
      $('guard-close').onclick=closePanel;
      return;
    }

    var byCat={};
    rows.forEach(function(r){
      r.hits.forEach(function(h){
        var c=h.category||'감지';
        if(!byCat[c])byCat[c]=[];
        byCat[c].push(h.word);
      });
    });

    var catHtml=Object.keys(byCat).map(function(cat){
      var uniq=byCat[cat].filter(function(v,i,a){return a.indexOf(v)===i;});
      return '<span style="display:inline-block;margin:2px;padding:4px 7px;border-radius:999px;background:#7f1d1d;border:1px solid #ef4444;color:#fff;font-size:11px;font-weight:900;">'+esc(cat)+' : '+esc(uniq.join(', '))+'</span>';
    }).join('');

    var list=rows.slice(0,15).map(function(r){
      var hitText=r.hits.map(function(h){return h.word+(h.count>1?'×'+h.count:'')+' +'+h.sum;}).join(', ');
      return '<div style="margin-top:7px;padding:8px;border-radius:10px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.10);">'
        +'<div style="color:#7ec8ff;font-size:12px;font-weight:1000;">'+esc(r.board)+'</div>'
        +'<div style="margin-top:3px;color:#fff;font-size:13px;font-weight:900;line-height:1.35;">'+esc(r.title)+'</div>'
        +'<div style="margin-top:5px;color:#ffb4b4;font-size:12px;font-weight:900;">감지: '+esc(hitText)+'</div>'
        +'</div>';
    }).join('');

    p.style.border='1px solid #ef4444';
    p.style.maxHeight='260px';
    p.innerHTML='<div style="padding:10px 42px 10px 13px;background:rgba(15,23,42,.94);border-bottom:1px solid rgba(239,68,68,.45);">'
      +'<button id="guard-close" type="button" style="position:absolute;right:10px;top:8px;width:28px;height:28px;border:0;border-radius:8px;background:#475569;color:#fff;font-weight:1000;cursor:pointer;">×</button>'
      +'<div style="font-size:16px;font-weight:1000;color:#fff;">'+esc(level.emoji||'🚨')+' 게시글 제목 감지</div>'
      +'<div style="margin-top:4px;color:#ffb4b4;font-size:13px;font-weight:900;">'+esc(level.label||'감지')+' · 점수 '+total+'점 · 감지글 '+rows.length+'건</div>'
      +'<div style="margin-top:6px;">'+catHtml+'</div>'
      +'<details style="margin-top:7px;">'
      +'<summary style="cursor:pointer;color:#93c5fd;font-size:12px;font-weight:1000;">상세보기 / 접기</summary>'
      +'<div style="padding:7px 0 2px;">'+list+'</div>'
      +'</details>'
      +'</div>';
    $('guard-close').onclick=closePanel;
  }

  function renderFrames(){
    var enc=encodeURIComponent(nick);
    document.title='와이고수 닉네임 검색 - '+nick;
    document.getElementById('frames').innerHTML=boards.map(function(b){
      var src=b.url+'?best_article=N&searcht=w&search='+enc;
      return '<div class="col"><div class="head">'+esc(b.name)+' 검색 : '+esc(nick)+'</div><iframe class="yg-frame" data-board="'+esc(b.name)+'" src="'+src+'"></iframe></div>';
    }).join('');
  }

  async function scanWithWorker(){
    if(!nick){
      status('닉네임 없음','#fca5a5');
      return;
    }

    var dict=await loadDict();
    var keywords=flatten(dict);
    var lv=levels(dict);
    var all=[];

    for(var i=0;i<boards.length;i++){
      var b=boards[i];
      try{
        status((i+1)+'/'+boards.length+' '+b.name+' 제목 분석중...', '#fbbf24');
        var searchUrl=b.url+'?best_article=N&searcht=w&search='+encodeURIComponent(nick);
        var html=await fetchHtml(searchUrl);
        var rows=collectArticleLinksFromSearch(html,b.name);
        rows.forEach(function(r){
          r.hits=scanTitle(r.title,keywords);
          if(r.hits.length)all.push(r);
        });
      }catch(e){
        console.warn('worker scan failed', b.name, e);
      }
    }

    renderPopup(all,lv);
  }

  renderFrames();
  scanWithWorker();
})();
</script>
</body>
</html>
